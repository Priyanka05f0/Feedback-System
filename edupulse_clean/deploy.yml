---
- name: Deploy EduPulse with Database
  hosts: ec2_server
  become: yes
  tasks:
    - name: Update apt cache
      apt: update_cache=yes

    - name: Install Java 17 and MySQL
      apt:
        name: 
          - openjdk-17-jre-headless
          - psmisc
          - mysql-server
        state: present

    - name: Ensure MySQL is running
      service:
        name: mysql
        state: started
        enabled: yes

    - name: Copy JAR file to EC2
      copy:
        src: ./target/edupulse-1.0.0.jar
        dest: /home/ubuntu/edupulse.jar
        mode: '0755'

    - name: Kill any existing process on port 8087
      shell: "fuser -k 8087/tcp || true"

    - name: Start the Application
      shell: "nohup java -jar /home/ubuntu/edupulse.jar > /home/ubuntu/app.log 2>&1 &"
      async: 60
      poll: 0