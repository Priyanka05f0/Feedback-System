spring.application.name=EduPulse
server.port=8087

# ===============================
# MySQL Configuration (LOCAL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/edupulse_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# (optional - can remove, Spring auto-detects)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# Thymeleaf
# ===============================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===============================
# Logging
# ===============================
logging.level.org.springframework.security=WARN
logging.level.com.edupulse=INFO
logging.level.org.hibernate=WARN